name: Sync OpenAPI Spec

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm ci

      - name: Fetch spec and regenerate
        run: npm run generate

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet packages/*/src/generated; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.diff.outputs.changed == 'true'
        run: npm run build

      - name: Test
        if: steps.diff.outputs.changed == 'true'
        run: npm run test

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PAT_TOKEN }}
          branch: chore/sync-openapi-spec
          commit-message: "chore: sync OpenAPI spec from upstream"
          title: "chore: sync OpenAPI spec from upstream"
          body: |
            Automated PR — the upstream Outseta OpenAPI spec has changed.

            This PR regenerates all client code from the latest spec.
          labels: automated
